services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: nova-studio-ts
    hostname: nova-studio
    restart: unless-stopped
    env_file: .env
    environment:
      - TS_HOSTNAME=nova-studio
      - TS_USERSPACE=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_CERT_DOMAIN=nova-studio.tail9d0c71.ts.net
    volumes:
      - ts_state:/var/lib/tailscale
      - ./ts/serve.json:/config/serve.json:ro
    ports:
      - "127.0.0.1:4100:4000"

  app:
    build: .
    image: nova-studio-app:local
    container_name: nova-studio-app
    network_mode: service:tailscale
    depends_on:
      - tailscale
    environment:
      - PORT=4000
      - NOVA_DATA_DIR=/app/data
      - NOVA_UPLOAD_DIR=/app/server/uploads
      - NOVA_EXPORT_DIR=/app/data/exports
    volumes:
      - ./data:/app/data
      - ./server/uploads:/app/server/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ts_state:
