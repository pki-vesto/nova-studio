name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api-unit:
    name: API unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run deterministic unit tests
        run: npm test
